apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubevalet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevalet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubevalet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "kubevalet.labels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      serviceAccountName: {{ include "kubevalet.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "kubevalet.postgresHost" . }} 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
      {{- end }}
      containers:
        - name: kubevalet
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GIN_MODE
              value: release
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: CLUSTER_SERVER
              value: {{ .Values.cluster.server | quote }}
            - name: TOKEN_TTL
              value: {{ .Values.auth.tokenTTL | quote }}
            - name: ADMIN_USERNAME
              value: {{ .Values.auth.adminUsername | quote }}
            - name: ENABLE_LOCAL_USERS
              value: {{ .Values.localUsers.enabled | quote }}
            ## Sensitive values from Secret
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubevalet.fullname" . }}
                  key: POSTGRES_DSN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubevalet.fullname" . }}
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubevalet.fullname" . }}
                  key: ADMIN_PASSWORD
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
