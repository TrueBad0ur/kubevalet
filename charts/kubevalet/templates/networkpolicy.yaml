{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubevalet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevalet.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubevalet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Kubernetes API server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubevalet.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevalet.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubevalet.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "kubevalet.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 5432
  egress: []
{{- end }}
{{- end }}
