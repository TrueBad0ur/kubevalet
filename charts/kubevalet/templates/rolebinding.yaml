apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubevalet.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevalet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubevalet.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "kubevalet.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
