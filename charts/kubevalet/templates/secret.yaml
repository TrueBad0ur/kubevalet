{{- $fullname := include "kubevalet.fullname" . }}
{{- $ns      := .Release.Namespace }}
{{- $existing := lookup "v1" "Secret" $ns $fullname }}

{{- /* Preserve JWT_SECRET across upgrades; generate once on first install. */}}
{{- $jwtSecret := "" }}
{{- if $existing }}
  {{- $jwtSecret = index $existing.data "JWT_SECRET" | b64dec }}
{{- else if .Values.auth.jwtSecret }}
  {{- $jwtSecret = .Values.auth.jwtSecret }}
{{- else }}
  {{- $jwtSecret = randAlphaNum 32 }}
{{- end }}

{{- /* Preserve POSTGRES_PASSWORD across upgrades; generate once on first install. */}}
{{- $pgPassword := "" }}
{{- if $existing }}
  {{- $pgPassword = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
{{- else if .Values.postgres.password }}
  {{- $pgPassword = .Values.postgres.password }}
{{- else }}
  {{- $pgPassword = randAlphaNum 24 }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  namespace: {{ $ns }}
  labels:
    {{- include "kubevalet.labels" . | nindent 4 }}
type: Opaque
{{- $postgresDSN := "" }}
{{- if .Values.postgres.enabled }}
  {{- $postgresDSN = printf "postgres://%s:%s@%s:5432/%s?sslmode=disable"
      .Values.postgres.user $pgPassword
      (include "kubevalet.postgresHost" .) .Values.postgres.database }}
{{- else }}
  {{- $postgresDSN = required "postgres.external.dsn is required when postgres.enabled is false" .Values.postgres.external.dsn }}
{{- end }}
stringData:
  POSTGRES_DSN:      {{ $postgresDSN | quote }}
  POSTGRES_PASSWORD: {{ $pgPassword | quote }}
  JWT_SECRET:        {{ $jwtSecret | quote }}
  ADMIN_PASSWORD:    {{ .Values.auth.adminPassword | quote }}
