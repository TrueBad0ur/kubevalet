name: PR validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Build, test, lint
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go build
        run: |
          mkdir -p web/dist
          touch web/dist/index.html
          go build ./...

      - name: Go test
        run: go test ./...

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint charts/kubevalet

      - uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          build-args: VERSION=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Auto-label or notify
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN || github.token }}
          script: |
            const author = context.payload.pull_request.user.login
            const pr = context.payload.pull_request.number
            if (author === 'TrueBad0ur') {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                labels: ['ok-to-test'],
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body: '@TrueBad0ur all checks passed — ready to add `ok-to-test` label to build the image.',
              })
            }
