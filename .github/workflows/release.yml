name: Release

on:
  push:
    tags:
      - "v*"   # trigger: git tag v0.3.10 && git push --tags

env:
  IMAGE:      truebad0ur/kubevalet
  REGISTRY:   ghcr.io
  CHART_NAME: kubevalet
  CHART_PATH: charts/kubevalet

jobs:

  docker:
    name: Docker image → DockerHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: Helm chart → ghcr.io + Artifact Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and lowercase owner
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
      - uses: oras-project/setup-oras@v1

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Log in to ghcr.io (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ steps.meta.outputs.owner }} \
            --password-stdin

      - name: Log in to ghcr.io (oras)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          oras login ${{ env.REGISTRY }} \
            --username ${{ steps.meta.outputs.owner }} \
            --password-stdin

      - name: Package chart
        run: |
          helm package ${{ env.CHART_PATH }} \
            --version ${{ steps.meta.outputs.version }} \
            --app-version ${{ steps.meta.outputs.version }} \
            --destination /tmp/chart-output

      - name: Push chart to ghcr.io
        run: |
          helm push \
            /tmp/chart-output/${{ env.CHART_NAME }}-${{ steps.meta.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}

      - name: Push artifacthub-repo.yml
        run: |
          oras push \
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ env.CHART_NAME }}:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
