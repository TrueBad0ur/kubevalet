name: PR image

# Security model:
#   - For own PRs: triggered via repository_dispatch from pr-validate (no label involvement)
#   - For external PRs: triggered by maintainer adding "ok-to-test" label after code review
#     New commits from external contributors remove the label, requiring re-review.
#
# Image tag: <next-patch-version>-<branch-name>
# e.g. latest release v0.3.16, branch "super-feature" → truebad0ur/kubevalet:0.3.17-super-feature

on:
  repository_dispatch:
    types: [build-pr-image]
  pull_request_target:
    types: [labeled, synchronize]
    branches: [main]

env:
  IMAGE: truebad0ur/kubevalet

jobs:
  # Remove "ok-to-test" label when external contributor pushes new commits
  unlabel:
    name: Remove ok-to-test on new push
    if: github.event_name == 'pull_request_target' && github.event.action == 'synchronize' && github.event.pull_request.user.login != 'TrueBad0ur'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name)
            if (!labels.includes('ok-to-test')) return
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'ok-to-test',
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ New commits pushed — `ok-to-test` label removed. Re-review required before building.',
            })

  # Build and push PR image
  build:
    name: Build and push PR image
    if: |
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'ok-to-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_sha || github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        run: |
          LATEST=$(git tag -l 'v[0-9]*' | sort -V | tail -1 | sed 's/^v//')
          [ -z "$LATEST" ] && LATEST="0.0.0"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          RAW_BRANCH="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.head_ref || github.event.pull_request.head.ref }}"
          BRANCH=$(echo "$RAW_BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | cut -c1-50)
          echo "tag=${NEXT}-${BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.tag.outputs.tag }}
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
