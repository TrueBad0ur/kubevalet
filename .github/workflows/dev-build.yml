name: Dev build

on:
  push:
    branches:
      - "[0-9]*.[0-9]*.[0-9]*-*"   # e.g. 0.3.13-dev, 0.3.13-feature-oidc

env:
  IMAGE: truebad0ur/kubevalet

jobs:
  docker:
    name: Docker image → DockerHub (branch tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate branch name format
        run: |
          branch="${GITHUB_REF_NAME}"
          if ! echo "$branch" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-[a-z0-9-]+$'; then
            echo "Branch '$branch' does not match required format: x.x.x-word (e.g. 0.3.13-dev)"
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
